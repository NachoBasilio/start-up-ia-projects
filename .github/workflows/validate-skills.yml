name: Validate Skills

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run skills validator
        run: ./scripts/validate-skills.sh

      - name: Run validator test suite
        run: ./tests/validate-skills.test.sh
